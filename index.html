<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>assignment-2</title>
  <link rel="stylesheet" href="/src/style.css">
</head>

<body>
  <div class="container">
    <h1>Cubic Solver</h1>
    <form id="cubic-form">
      <label for="a">a value:</label>
      <input type="number" id="a" name="a" required />
      <label for="b">b value:</label>
      <input type="number" id="b" name="b" required />
      <label for="c">c value:</label>
      <input type="number" id="c" name="c" required />
      <label for="d">d value:</label>
      <input type="number" id="d" name="d" required />
      <input type="submit" value="Calculate" />
    </form>
  </div>
  <div class="container">
    <h1>Results</h1>
    <form id="result">
      <label for="rootOne">Root 1:</label>
      <input type="text" id="rootOne" readonly />
      <label for="rootTwo">Root 2:</label>
      <input type="text" id="rootTwo" readonly />
      <label for="rootThree">Root 3:</label>
      <input type="text" id="rootThree" readonly />
      <label for="p">p:</label>
      <input type="text" id="p" readonly />
      <label for="q">q:</label>
      <input type="text" id="q" readonly />
      <label for="discriminant">Discriminate:</label>
      <input type="text" id="discriminant" readonly />
    </form>
  </div>
  <div class="visual">
    <div class="equation">
      <p id="equation">y = ax³ + bx² + cx + d</p>
    </div>
    <div class="graph">
      <canvas id="graph" width="600" height="600"></canvas>
    </div>
  </div>
  <script type="module" src="/src/script.ts"></script>
</body>

</html>
